[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Force a recent Node version that's compatible with Vite 5 + the @vitejs/plugin-react-swc native binary
  NODE_VERSION = "20"

# SPA routing — serve index.html for any path that doesn't match a real file
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
